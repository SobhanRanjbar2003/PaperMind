services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: book-summarizer-backend:latest
    container_name: book-summarizer-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
